name: build
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  prepare:
    name: prepare build matrix
    runs-on: windows-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Checkout private feature source
        if: ${{ vars.FEATURES_REPO != '' && secrets.FEATURES_REPO_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.FEATURES_REPO }}
          ref: ${{ vars.FEATURES_REPO_REF }}
          token: ${{ secrets.FEATURES_REPO_TOKEN }}
          path: private-features

      - id: matrix
        shell: pwsh
        run: |
          $featureNames = @()

          if (Test-Path 'features') {
              $featureNames += Get-ChildItem -Path 'features' -Directory | Select-Object -ExpandProperty Name
          }

          if (Test-Path 'private-features/features') {
              $featureNames += Get-ChildItem -Path 'private-features/features' -Directory | Select-Object -ExpandProperty Name
          }

          $featureNames = $featureNames | Sort-Object -Unique

          $include = @(
              [pscustomobject]@{
                  feature_name = ''
                  artifact_name = 'release-${{ github.run_number }}'
              }
          )

          foreach ($featureName in $featureNames) {
              $include += [pscustomobject]@{
                  feature_name = $featureName
                  artifact_name = $featureName
              }
          }

          $matrixJson = [pscustomobject]@{ include = $include } | ConvertTo-Json -Depth 5 -Compress
          "matrix=$matrixJson" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

  build:
    name: build ${{ matrix.artifact_name }}
    runs-on: windows-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    env:
      APP_EXE: dist/mcf-bet-bot.exe
    steps:
      - uses: actions/checkout@v4

      - name: Checkout private feature source
        if: ${{ vars.FEATURES_REPO != '' && secrets.FEATURES_REPO_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.FEATURES_REPO }}
          ref: ${{ vars.FEATURES_REPO_REF }}
          token: ${{ secrets.FEATURES_REPO_TOKEN }}
          path: private-features

      - uses: oven-sh/setup-bun@v2

      - run: bun install
      - name: Apply patches
        run: |
          Copy-Item -Recurse -Force patch\* node_modules\

      - name: Overlay feature files
        if: ${{ matrix.feature_name != '' }}
        shell: pwsh
        run: |
          $featureName = '${{ matrix.feature_name }}'
          $privateFeaturePath = Join-Path 'private-features/features' $featureName
          $publicFeaturePath = Join-Path 'features' $featureName

          if (Test-Path $privateFeaturePath) {
              $sourcePath = $privateFeaturePath
          } elseif (Test-Path $publicFeaturePath) {
              $sourcePath = $publicFeaturePath
          } else {
              throw "Feature source not found: $featureName"
          }

          Copy-Item -Path (Join-Path $sourcePath '*') -Destination . -Recurse -Force

      # - name: Install UPX
      #   run: choco install upx -y
      - run: bun scripts/build.js

      # - name: Pack with UPX
      #   run: upx --best --lzma ${{ env.APP_EXE }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/
          if-no-files-found: error
